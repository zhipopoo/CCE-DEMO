# Default values for cce-demo.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global settings
namespace:
  name: cce-demo
  labels:
    app: cce-demo

# MySQL Configuration
mysql:
  enabled: true
  image: mysql:8.0
  replicas: 1
  
  auth:
    rootPassword: cce-demo-password
    username: cceuser
    password: cceuser-password
  
  database: ccedemo
  
  persistence:
    enabled: true
    size: 5Gi
    storageClass: csi-disk
    accessMode: ReadWriteOnce
  
  service:
    type: ClusterIP
    port: 3306
  
  resources: {}
  
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
  
  readinessProbe:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 2
    timeoutSeconds: 1

# Backend Configuration
backend:
  enabled: true
  image: cce-demo-backend:latest
  imagePullPolicy: IfNotPresent
  replicas: 2
  
  service:
    type: ClusterIP
    port: 8080
  
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  
  livenessProbe:
    enabled: true
    path: /actuator/health
    port: 8080
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
  
  readinessProbe:
    enabled: true
    path: /actuator/health
    port: 8080
    initialDelaySeconds: 30
    periodSeconds: 5
    timeoutSeconds: 3

# Frontend Configuration
frontend:
  enabled: true
  image: cce-demo-frontend:latest
  imagePullPolicy: IfNotPresent
  replicas: 2
  
  service:
    type: LoadBalancer
    port: 80
  
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
