apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: cce-demo
  labels:
    app: mysql
    component: database
spec:
  serviceName: mysql-service
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
        component: database
    spec:
      # Use init container to ensure proper permissions
      initContainers:
      - name: init-mysql
        image: busybox:1.35
        command: ['sh', '-c', 'mkdir -p /var/lib/mysql/mysql && chown -R 999:999 /var/lib/mysql']
        volumeMounts:
        - name: mysql-persistent-storage
          mountPath: /var/lib/mysql

      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
          name: mysql
          protocol: TCP

        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: mysql-root-password
        - name: MYSQL_DATABASE
          valueFrom:
            configMapKeyRef:
              name: mysql-config
              key: mysql-database
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: mysql-user
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: mysql-password

        volumeMounts:
        - name: mysql-persistent-storage
          mountPath: /var/lib/mysql
          subPath: mysql
        - name: mysql-init-scripts
          mountPath: /docker-entrypoint-initdb.d
          readOnly: true

        # Liveness probe - check if MySQL is running
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - "mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD}"
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        # Readiness probe - check if MySQL is ready to accept connections
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - "mysql -h 127.0.0.1 -u root -p${MYSQL_ROOT_PASSWORD} -e 'SELECT 1'"
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3

        # Resource limits and requests
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"

        # Security context
        securityContext:
          runAsUser: 999
          runAsGroup: 999
          allowPrivilegeEscalation: false

      # Pod security context
      securityContext:
        fsGroup: 999

      # Volumes
      volumes:
      - name: mysql-init-scripts
        configMap:
          name: mysql-init-script
          defaultMode: 0755

  # Volume claim template for persistent storage
  volumeClaimTemplates:
  - metadata:
      name: mysql-persistent-storage
      labels:
        app: mysql
        component: database
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
      storageClassName: csi-disk
