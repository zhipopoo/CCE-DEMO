apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: cce-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: swr.ap-southeast-1.myhuaweicloud.com/andy-demo/cce-demo-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: DB_HOST
          value: mysql-service
        - name: DB_PORT
          value: "3306"
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: mysql-config
              key: mysql-database
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: mysql-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: mysql-password
        # File storage - just set mount type for dynamic OBS
        - name: FILE_MOUNT_TYPE
          value: "obs"
        # To use AK/SK, uncomment below
        # - name: OBS_BUCKET
        #   value: "your-bucket-name"
        # - name: OBS_ENDPOINT
        #   value: "obs.ap-southeast-1.myhuaweicloud.com"
        # - name: OBS_ACCESS_KEY
        #   valueFrom:
        #     secretKeyRef:
        #       name: obs-credentials
        #       key: access-key
        # - name: OBS_SECRET_KEY
        #   valueFrom:
        #     secretKeyRef:
        #       name: obs-credentials
        #       key: secret-key
        volumeMounts:
        - name: obs-volume
          mountPath: /app/uploads
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: obs-volume
        persistentVolumeClaim:
          claimName: backend-storage-pvc
      imagePullSecrets:
        - name: default-secret
