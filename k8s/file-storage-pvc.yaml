# OBS Storage PVC for Huawei Cloud CCE
# Using OBS with AK/SK credentials
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-storage-pvc
  namespace: cce-demo
  annotations:
    # OBS type: STANDARD or WARM
    everest.io/obs-volume-type: "STANDARD"
    # Storage volume name prefix
    everest.io/csi.volume-name-prefix: "cce-demo"
    # OBS instance type
    csi.storage.k8s.io/fstype: "obsfs"
    # Custom secret for OBS credentials
    csi.storage.k8s.io/node-publish-secret-name: "obs-credentials"
    csi.storage.k8s.io/node-publish-secret-namespace: "cce-demo"
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
  storageClassName: csi-obs
---
# OBS Credentials Secret
apiVersion: v1
kind: Secret
metadata:
  name: obs-credentials
  namespace: cce-demo
type: Opaque
stringData:
  access-key: YOUR_OBS_ACCESS_KEY
  secret-key: YOUR_OBS_SECRET_KEY
