# Note: PVC is now managed by StatefulSet volumeClaimTemplates
# This file is kept for reference and manual PVC creation if needed
#
# For StatefulSet deployment, PVCs are automatically created with the pattern:
# <pvc-name>-<statefulset-name>-<ordinal>
# Example: mysql-persistent-storage-mysql-0
#
# If you need to create a PVC manually (not recommended with StatefulSet),
# uncomment the following:

# apiVersion: v1
# kind: PersistentVolumeClaim
# metadata:
#   name: mysql-pvc
#   namespace: cce-demo
#   labels:
#     app: mysql
#     component: database
# spec:
#   accessModes:
#     - ReadWriteOnce
#   resources:
#     requests:
#       storage: 5Gi
#   storageClassName: csi-disk
