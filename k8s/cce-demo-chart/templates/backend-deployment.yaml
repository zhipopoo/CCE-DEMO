{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ .Values.namespace.name }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
      - name: backend
        image: {{ .Values.backend.image }}
        imagePullPolicy: {{ .Values.backend.imagePullPolicy }}
        ports:
        - containerPort: 8080
        env:
        - name: DB_HOST
          value: mysql-service
        - name: DB_PORT
          value: "3306"
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: mysql-config
              key: mysql-database
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: mysql-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: mysql-password
        {{- if .Values.fileStorage.mountType }}
        - name: FILE_MOUNT_TYPE
          value: {{ .Values.fileStorage.mountType }}
        {{- end }}
        {{- if .Values.fileStorage.mountType }}
        - name: OBS_BUCKET
          value: {{ .Values.fileStorage.obs.bucket }}
        - name: OBS_ENDPOINT
          value: {{ .Values.fileStorage.obs.endpoint }}
        - name: OBS_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.fileStorage.obs.secretName }}
              key: access-key
        - name: OBS_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.fileStorage.obs.secretName }}
              key: secret-key
        {{- end }}
        volumeMounts:
        {{- if eq .Values.fileStorage.mountType "obs" }}
        - name: obs-storage
          mountPath: /app/uploads
        {{- else if eq .Values.fileStorage.mountType "local" }}
        - name: local-storage
          mountPath: /app/uploads
        {{- end }}
        {{- if .Values.backend.livenessProbe.enabled }}
        livenessProbe:
          httpGet:
            path: {{ .Values.backend.livenessProbe.path }}
            port: {{ .Values.backend.livenessProbe.port }}
          initialDelaySeconds: {{ .Values.backend.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.backend.livenessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.backend.livenessProbe.timeoutSeconds }}
        {{- end }}
        {{- if .Values.backend.readinessProbe.enabled }}
        readinessProbe:
          httpGet:
            path: {{ .Values.backend.readinessProbe.path }}
            port: {{ .Values.backend.readinessProbe.port }}
          initialDelaySeconds: {{ .Values.backend.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.backend.readinessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.backend.readinessProbe.timeoutSeconds }}
        {{- end }}
        resources:
          requests:
            memory: {{ .Values.backend.resources.requests.memory }}
            cpu: {{ .Values.backend.resources.requests.cpu }}
          limits:
            memory: {{ .Values.backend.resources.limits.memory }}
            cpu: {{ .Values.backend.resources.limits.cpu }}
      volumes:
      {{- if eq .Values.fileStorage.mountType "obs" }}
      - name: obs-storage
        persistentVolumeClaim:
          claimName: {{ .Values.fileStorage.obs.pvcName }}
      {{- else if eq .Values.fileStorage.mountType "local" }}
      - name: local-storage
        persistentVolumeClaim:
          claimName: {{ .Values.fileStorage.local.pvcName }}
      {{- end }}
{{- end }}
