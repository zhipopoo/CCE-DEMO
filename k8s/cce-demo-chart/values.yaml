# Default values for cce-demo.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global settings
namespace:
  name: cce-demo
  labels:
    app: cce-demo

# Image pull secrets for private registry
imagePullSecrets:
  - name: default-secret

# MySQL Configuration
mysql:
  enabled: true
  image: mysql:8.0
  replicas: 1

  auth:
    rootPassword: cce-demo-password
    username: cceuser
    password: cceuser-password

  database: ccedemo

  persistence:
    enabled: true
    size: 5Gi
    storageClass: csi-disk
    accessMode: ReadWriteOnce

  service:
    type: ClusterIP
    port: 3306

  resources: {}

  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5

  readinessProbe:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 2
    timeoutSeconds: 1

# Backend Configuration
backend:
  enabled: true
  image: swr.ap-southeast-1.myhuaweicloud.com/andy-demo/cce-demo-backend:latest
  imagePullPolicy: IfNotPresent
  replicas: 1

  service:
    type: ClusterIP
    port: 8080

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  livenessProbe:
    enabled: true
    path: /actuator/health
    port: 8080
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5

  readinessProbe:
    enabled: true
    path: /actuator/health
    port: 8080
    initialDelaySeconds: 30
    periodSeconds: 5
    timeoutSeconds: 3

# Frontend Configuration
frontend:
  enabled: true
  image: swr.ap-southeast-1.myhuaweicloud.com/andy-demo/cce-demo-frontend:latest
  imagePullPolicy: IfNotPresent
  replicas: 1

  service:
    type: LoadBalancer
    port: 80

  # Nginx configuration
  nginx:
    # Backend service name for API proxy
    backendService: backend-service
    backendPort: 8080

  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# File Storage Configuration
fileStorage:
  # Mount type: "local" or "obs"
  mountType: "local"
  
  # Local storage configuration (for docker-compose or single node k8s)
  local:
    pvcName: "local-storage-pvc"
  
  # OBS (Object Storage Service) configuration (for cloud k8s)
  obs:
    pvcName: "backend-storage-pvc"
    capacity: "1Gi"
    volumeType: "STANDARD"
    volumeNamePrefix: "cce-demo"
   
