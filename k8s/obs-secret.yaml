# OBS Credentials Secret for Huawei Cloud CCE
# Using IAM user AK/SK (base64 encoded)
apiVersion: v1
kind: Secret
metadata:
  name: obs-credentials
  namespace: cce-demo
  labels:
    secret.kubernetes.io/used-by: csi
type: cfe/secure-opaque
data:
  # Replace with base64 encoded AK/SK
  # echo -n "YOUR_ACCESS_KEY" | base64
  access.key: REPLACE_WITH_BASE64_ENCODED_AK
  # echo -n "YOUR_SECRET_KEY" | base64
  secret.key: REPLACE_WITH_BASE64_ENCODED_SK
